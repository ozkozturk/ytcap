name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      target:
        description: Publish the current ref to TestPyPI.
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Check release tag matches package version
        if: ${{ github.event_name == 'release' }}
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("src/ytcap/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not find __version__")
          print(match.group(1))
          PY
          )"
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Store release distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-to-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ytcap
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-to-testpypi
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    environment:
      name: pypi
      url: https://pypi.org/p/ytcap
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
